<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Destructuring Examples</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    padding:40px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:40px;
    border-radius:20px;
}

h1{
    font-size:45px;
    margin-bottom:20px;
}

.info{
    background:#334155;
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
}

textarea{
    width:100%;
    height:350px;
    margin-top:20px;
    background:#020617;
    color:#38bdf8;
    border:none;
    border-radius:15px;
    padding:20px;
    font-size:16px;
    font-family:monospace;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    font-size:18px;
    cursor:pointer;
}

.result{
    margin-top:25px;
    background:#020617;
    padding:20px;
    border-radius:15px;
    min-height:100px;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h1>Array & Object Destructuring</h1>

<div class="info">

<p>
Destructuring helps extract values from arrays
and objects easily.
</p>

</div>

<textarea id="code">
const colors = ["Red","Blue","Green"];

const [first, second] = colors;

console.log(first);
console.log(second);

const student = {

    name:"John",
    age:22

};

const {name, age} = student;

console.log(name);
console.log(age);
</textarea>

<button onclick="runCode()">
Run Code
</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

function runCode(){

try{

let output = "";

const log = console.log;

console.log = function(message){

output += message + "<br>";

};

eval(document.getElementById("code").value);

document.getElementById("result").innerHTML =
output;

console.log = log;

}
catch(error){

document.getElementById("result").innerHTML =
error;

}

}

</script>

</body>
</html>
