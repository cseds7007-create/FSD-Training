<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Arrow Functions</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1d2671,#c33764);
    min-height:100vh;
    padding:40px;
    color:white;
}

.container{
    max-width:1200px;
    margin:auto;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

h1{
    font-size:45px;
    margin-bottom:20px;
}

.info{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    line-height:1.8;
}

textarea{
    width:100%;
    height:350px;
    margin-top:25px;
    border:none;
    border-radius:15px;
    background:#111827;
    color:#38bdf8;
    padding:20px;
    font-size:16px;
    font-family:monospace;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    font-size:18px;
    cursor:pointer;
}

.result{
    margin-top:25px;
    background:#111827;
    padding:20px;
    border-radius:15px;
    min-height:120px;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h1>Arrow Functions & Utility Methods</h1>

<div class="info">

<p>
Arrow functions provide shorter syntax for functions.
Reusable utility methods improve code organization.
</p>

</div>

<textarea id="code">
const add = (a,b) => a+b;

console.log(add(10,20));

const square = num => num*num;

console.log(square(5));

const greet = name => `Hello ${name}`;

console.log(greet("John"));
</textarea>

<button onclick="runCode()">
Run Code
</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

function runCode(){

try{

let output = "";

const oldLog = console.log;

console.log = function(message){

output += message + "<br>";

};

eval(document.getElementById("code").value);

document.getElementById("result").innerHTML =
output;

console.log = oldLog;

}
catch(error){

document.getElementById("result").innerHTML =
error;

}

}

</script>

</body>
</html>
