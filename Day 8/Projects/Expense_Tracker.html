<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expense Tracker Logic App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#eef2f7;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:20px;
    color:#111827;
}

.info{
    background:#dbeafe;
    padding:20px;
    border-radius:15px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.expense-list{
    margin-top:30px;
}

.item{
    background:#f8fafc;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.total{
    margin-top:30px;
    font-size:28px;
    font-weight:bold;
    color:#2563eb;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h1>Expense Tracker Logic App</h1>

<div class="info">

<p>
Track daily expenses using JavaScript arrays,
DOM manipulation and functions.
</p>

</div>

<input type="text" id="title" placeholder="Expense Name">

<input type="number" id="amount" placeholder="Expense Amount">

<button onclick="addExpense()">
Add Expense
</button>

<div class="expense-list" id="expenseList"></div>

<div class="total" id="total">
Total: ₹0
</div>

</div>

</div>

<script>

let total = 0;

function addExpense(){

let title =
document.getElementById("title").value;

let amount =
parseFloat(document.getElementById("amount").value);

if(title === "" || isNaN(amount)){

alert("Enter valid details");
return;

}

total += amount;

const item = document.createElement("div");

item.classList.add("item");

item.innerHTML = `

<span>${title}</span>

<span>₹${amount}</span>

`;

document.getElementById("expenseList")
.appendChild(item);

document.getElementById("total")
.innerHTML = `Total: ₹${total}`;

document.getElementById("title").value = "";
document.getElementById("amount").value = "";

}

</script>

</body>
</html>
