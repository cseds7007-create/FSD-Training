<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Array Traversal</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fb;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
}

textarea{
    width:100%;
    height:300px;
    margin-top:20px;
    padding:20px;
    font-family:monospace;
}

button{
    margin-top:20px;
    padding:15px 30px;
    background:#2563eb;
    color:white;
    border:none;
}

iframe{
    width:100%;
    height:250px;
    margin-top:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>Array Traversal</h1>

<p>
Array traversal means accessing each element of an array.
</p>

<textarea id="code">
<!DOCTYPE html>
<html>
<body>

<script>

let numbers = [10,20,30,40,50];

for(let i=0;i<numbers.length;i++){

    document.write(numbers[i] + "<br>");

}

</script>

</body>
</html>
</textarea>

<button onclick="runCode()">
Run Program
</button>

<iframe id="output"></iframe>

</div>

<script>

function runCode(){

document.getElementById("output").srcdoc =
document.getElementById("code").value;

}

</script>

</body>
</html>
