<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Student Marks Analyzer</title>

<style>

body{
    font-family:Arial;
    background:#eef2f7;
    padding:40px;
}

.container{
    background:white;
    padding:30px;
    border-radius:20px;
    max-width:700px;
    margin:auto;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:15px 25px;
    background:#2563eb;
    color:white;
    border:none;
}

.result{
    margin-top:20px;
    font-size:24px;
}

</style>

</head>
<body>

<div class="container">

<h1>Student Marks Analyzer</h1>

<input type="number" id="m1" placeholder="Subject 1">

<input type="number" id="m2" placeholder="Subject 2">

<input type="number" id="m3" placeholder="Subject 3">

<button onclick="analyze()">
Analyze
</button>

<div class="result" id="result"></div>

</div>

<script>

function analyze(){

let m1=parseInt(document.getElementById("m1").value);
let m2=parseInt(document.getElementById("m2").value);
let m3=parseInt(document.getElementById("m3").value);

let total = m1+m2+m3;
let avg = total/3;

document.getElementById("result").innerHTML =
"Total: " + total +
"<br>Average: " + avg;

}

</script>

</body>
</html>
