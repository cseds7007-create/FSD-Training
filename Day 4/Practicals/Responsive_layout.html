<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Responsive Layout</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        nav{
            background:#111827;
            padding:20px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }

        nav h1{
            color:white;
        }

        nav ul{
            display:flex;
            list-style:none;
            gap:20px;
            flex-wrap:wrap;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
            font-size:18px;
        }

        .hero{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:40px;
            padding:80px 10%;
            flex-wrap:wrap;
        }

        .hero-text{
            flex:1;
            min-width:300px;
        }

        .hero-text h2{
            font-size:55px;
            margin-bottom:20px;
            color:#111827;
        }

        .hero-text p{
            font-size:20px;
            line-height:1.8;
            color:#555;
        }

        .hero-text button{
            margin-top:25px;
            padding:15px 30px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

        .hero-image{
            flex:1;
            text-align:center;
            min-width:300px;
        }

        .hero-image img{
            width:100%;
            max-width:400px;
            border-radius:20px;
        }

        @media(max-width:768px){

            .hero{
                text-align:center;
            }

            .hero-text h2{
                font-size:40px;
            }

            nav{
                justify-content:center;
                gap:20px;
            }

        }

    </style>

</head>
<body>

    <nav>

        <h1>ResponsiveSite</h1>

        <ul>

            <li><a href="#">Home</a></li>

            <li><a href="#">About</a></li>

            <li><a href="#">Services</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    </nav>

    <section class="hero">

        <div class="hero-text">

            <h2>Responsive Web Design</h2>

            <p>
                This layout automatically adjusts for
                mobile, tablet and desktop devices
                using Flexbox and Media Queries.
            </p>

            <button>
                Learn More
            </button>

        </div>

        <div class="hero-image">

            <img src="https://picsum.photos/500/400" alt="responsive">

        </div>

    </section>

</body>
</html>
