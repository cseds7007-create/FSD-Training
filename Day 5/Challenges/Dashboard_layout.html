<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Responsive Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        .dashboard{
            display:grid;
            grid-template-columns:250px 1fr;
            min-height:100vh;
        }

        .sidebar{
            background:#111827;
            color:white;
            padding:30px;
        }

        .sidebar h2{
            margin-bottom:30px;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            margin:20px 0;
        }

        .sidebar ul li a{
            text-decoration:none;
            color:white;
            font-size:18px;
        }

        .main{
            padding:30px;
        }

        .header{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            margin-bottom:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .card h3{
            margin-bottom:15px;
            color:#2563eb;
        }

        .card p{
            font-size:30px;
            font-weight:bold;
        }

        @media(max-width:768px){

            .dashboard{
                grid-template-columns:1fr;
            }

            .sidebar{
                text-align:center;
            }

        }

    </style>

</head>
<body>

    <div class="dashboard">

        <!-- Sidebar -->
        <div class="sidebar">

            <h2>Dashboard</h2>

            <ul>

                <li><a href="#">Home</a></li>

                <li><a href="#">Analytics</a></li>

                <li><a href="#">Users</a></li>

                <li><a href="#">Settings</a></li>

            </ul>

        </div>

        <!-- Main Content -->
        <div class="main">

            <div class="header">

                <h1>Admin Dashboard</h1>

            </div>

            <div class="cards">

                <div class="card">

                    <h3>Total Users</h3>

                    <p>1,250</p>

                </div>

                <div class="card">

                    <h3>Revenue</h3>

                    <p>₹75K</p>

                </div>

                <div class="card">

                    <h3>Orders</h3>

                    <p>320</p>

                </div>

                <div class="card">

                    <h3>Visitors</h3>

                    <p>8,500</p>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
