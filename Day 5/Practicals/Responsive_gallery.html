<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Responsive Grid Gallery</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f4f7fb;
            font-family:Arial, Helvetica, sans-serif;
            padding:40px;
        }

        h1{
            text-align:center;
            margin-bottom:40px;
            color:#111827;
            font-size:45px;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            max-width:1300px;
            margin:auto;
        }

        .gallery img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:20px;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
        }

        .gallery img:hover{
            transform:scale(1.05);
        }

    </style>

</head>
<body>

    <h1>Responsive Image Gallery</h1>

    <div class="gallery">

        <img src="https://picsum.photos/id/1015/500/300" alt="image">

        <img src="https://picsum.photos/id/1025/500/300" alt="image">

        <img src="https://picsum.photos/id/1035/500/300" alt="image">

        <img src="https://picsum.photos/id/1045/500/300" alt="image">

        <img src="https://picsum.photos/id/1055/500/300" alt="image">

        <img src="https://picsum.photos/id/1065/500/300" alt="image">

        <img src="https://picsum.photos/id/1075/500/300" alt="image">

        <img src="https://picsum.photos/id/1085/500/300" alt="image">

    </div>

</body>
</html>
