<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Responsive Pricing Section</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#eef2f7;
            padding:50px 20px;
        }

        .title{
            text-align:center;
            margin-bottom:50px;
        }

        .title h1{
            font-size:50px;
            color:#111827;
        }

        .title p{
            margin-top:10px;
            font-size:18px;
            color:#555;
        }

        .pricing{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:30px;
            max-width:1200px;
            margin:auto;
        }

        .card{
            background:white;
            padding:40px 30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .card h2{
            color:#2563eb;
            margin-bottom:20px;
        }

        .price{
            font-size:50px;
            font-weight:bold;
            margin-bottom:20px;
            color:#111827;
        }

        .card ul{
            list-style:none;
            margin-bottom:30px;
        }

        .card ul li{
            margin:15px 0;
            color:#555;
        }

        button{
            padding:15px 30px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>
<body>

    <div class="title">

        <h1>Pricing Plans</h1>

        <p>
            Choose the best plan for your needs
        </p>

    </div>

    <div class="pricing">

        <!-- Basic -->
        <div class="card">

            <h2>Basic</h2>

            <div class="price">
                ₹499
            </div>

            <ul>

                <li>1 Website</li>

                <li>10GB Storage</li>

                <li>Email Support</li>

            </ul>

            <button>
                Choose Plan
            </button>

        </div>

        <!-- Standard -->
        <div class="card">

            <h2>Standard</h2>

            <div class="price">
                ₹999
            </div>

            <ul>

                <li>5 Websites</li>

                <li>50GB Storage</li>

                <li>Priority Support</li>

            </ul>

            <button>
                Choose Plan
            </button>

        </div>

        <!-- Premium -->
        <div class="card">

            <h2>Premium</h2>

            <div class="price">
                ₹1999
            </div>

            <ul>

                <li>Unlimited Websites</li>

                <li>200GB Storage</li>

                <li>24/7 Support</li>

            </ul>

            <button>
                Choose Plan
            </button>

        </div>

    </div>

</body>
</html>
