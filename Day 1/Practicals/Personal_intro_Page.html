<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Personal Introduction</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f7fa;
        }

        .profile{
            width:400px;
            margin:50px auto;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
        }

        .top{
            background:linear-gradient(135deg,#11998e,#38ef7d);
            color:white;
            text-align:center;
            padding:40px 20px;
        }

        .top img{
            width:120px;
            height:120px;
            border-radius:50%;
            border:5px solid white;
        }

        img:hover{
            transform:scale(1.1);
            transition:0.3s;
            content: url("https://i.pinimg.com/1200x/c8/31/38/c831380c9ab6fe41297dea63d4ea650a.jpg");
        }
        .content{
            padding:30px;
        }

        h2{
            color:#11998e;
        }

        ul{
            padding-left:20px;
        }

        li{
            margin-bottom:10px;
        }

    </style>

</head>
<body>

    <div class="profile">

        <div class="top">

            <img src="https://i.pinimg.com/1200x/35/30/76/353076910e2c9268c2ae8539780aa1a6.jpg" alt="profile">

            <h1>Gen-G</h1>

            <p>Web Development Student</p>

        </div>

        <div class="content">

            <h2>About Me</h2>

            <p>
                I am learning HTML, CSS and JavaScript
                to become a frontend developer.
            </p>

            <h2>Skills</h2>

            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>

            <h2>Hobbies</h2>

            <ul>
                <li>Coding</li>
                <li>Gaming</li>
                <li>Reading</li>
            </ul>

        </div>

    </div>

</body>
</html>
