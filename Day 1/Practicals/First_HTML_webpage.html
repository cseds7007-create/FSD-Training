<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>First HTML Webpage</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            width:500px;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            color:#4a00e0;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            color:#555;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            background:#4a00e0;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#6a11cb;
        }

    </style>
</head>
<body>

    <div class="card">

        <h1>Welcome to HTML</h1>

        <p>
            This is my first HTML webpage.
        </p>

        <button>
            Learn More
        </button>

    </div>

</body>
</html>
