<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Heading & Paragraph Examples</title>

    <style>

        body{
            margin:0;
            padding:40px;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f7fb;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            color:#1e3c72;
        }

        h2{
            color:#2a5298;
        }

        h3{
            color:#5b86e5;
        }

        h4,h5,h6{
            color:#555;
        }

        p{
            background:#eef3ff;
            padding:15px;
            border-left:5px solid #2a5298;
            border-radius:8px;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Heading 1</h1>

        <p>
            This is paragraph under Heading 1.
        </p>

        <h2>Heading 2</h2>

        <p>
            HTML provides different heading sizes.
        </p>

        <h3>Heading 3</h3>

        <p>
            Paragraphs are written using p tag.
        </p>

        <h4>Heading 4</h4>

        <h5>Heading 5</h5>

        <h6>Heading 6</h6>

    </div>

</body>
</html>
