<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Multi Page Website</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#eef2f7;
        }

        nav{
            background:#1e3c72;
            padding:20px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 20px;
            font-size:18px;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
        }

        .hero h1{
            font-size:50px;
            color:#1e3c72;
        }

        .hero p{
            font-size:20px;
            color:#555;
        }

    </style>

</head>
<body>

    <nav>

        <a href="home.html">Home</a>

        <a href="about.html">About</a>

        <a href="contact.html">Contact</a>

    </nav>

    <div class="hero">

        <h1>Welcome to My Website</h1>

        <p>
            This website demonstrates connecting multiple HTML pages.
        </p>

    </div>

</body>
</html>
