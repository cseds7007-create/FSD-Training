<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fb;
    padding:40px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
}

input{
    width:100%;
    padding:15px;
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:15px 25px;
    background:#2563eb;
    color:white;
    border:none;
}

.result{
    margin-top:20px;
    font-size:24px;
}

</style>

</head>
<body>

<div class="container">

<h1>Age Calculator</h1>

<input type="date" id="dob">

<button onclick="calculateAge()">
Calculate Age
</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateAge(){

let dob =
new Date(document.getElementById("dob").value);

let today = new Date();

let age = today.getFullYear() - dob.getFullYear();

document.getElementById("result").innerHTML =
"Age: " + age + " years";

}

</script>

</body>
</html>
