<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>String Operations</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fb;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
}

textarea{
    width:100%;
    height:300px;
    margin-top:20px;
    font-family:monospace;
    font-size:16px;
    padding:20px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
}

iframe{
    width:100%;
    height:250px;
    margin-top:20px;
    border:2px solid #ccc;
}

</style>

</head>
<body>

<div class="container">

<h1>String Operations</h1>

<p>
Learn length, uppercase, lowercase and substring methods.
</p>

<textarea id="code">
<!DOCTYPE html>
<html>
<body>

<script>

let text = "JavaScript";

document.write(text.length + "<br>");
document.write(text.toUpperCase() + "<br>");
document.write(text.toLowerCase() + "<br>");
document.write(text.substring(0,4));

</script>

</body>
</html>
</textarea>

<button onclick="runCode()">
Run Program
</button>

<iframe id="output"></iframe>

</div>

<script>

function runCode(){

document.getElementById("output").srcdoc =
document.getElementById("code").value;

}

</script>

</body>
</html>
