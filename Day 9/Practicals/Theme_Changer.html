<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Theme Changer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    transition:0.3s;
}

body{
    font-family:Arial;
    background:#f4f7fb;
    color:#111827;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:500px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:20px;
}

p{
    line-height:1.8;
    margin-bottom:30px;
}

button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.light{
    background:#2563eb;
    color:white;
}

.dark{
    background:#111827;
    color:white;
}

.colorful{
    background:#9333ea;
    color:white;
}

.dark-mode{
    background:#111827;
    color:white;
}

.dark-mode .container{
    background:#1f2937;
    color:white;
}

</style>

</head>
<body>

<div class="container">

<h1>Theme Changer</h1>

<p>
Change webpage themes dynamically using JavaScript.
</p>

<button class="light" onclick="lightMode()">
Light Mode
</button>

<button class="dark" onclick="darkMode()">
Dark Mode
</button>

<button class="colorful" onclick="colorfulMode()">
Colorful Mode
</button>

</div>

<script>

function lightMode(){

document.body.style.background = "#f4f7fb";
document.body.style.color = "#111827";

}

function darkMode(){

document.body.style.background = "#111827";
document.body.style.color = "white";

}

function colorfulMode(){

document.body.style.background =
"linear-gradient(135deg,#7f00ff,#e100ff)";

document.body.style.color = "white";

}

</script>

</body>
</html>
