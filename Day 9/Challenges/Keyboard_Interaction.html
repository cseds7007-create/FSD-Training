<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Keyboard Interaction Challenge</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:700px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:25px;
    text-align:center;
}

h1{
    font-size:42px;
    margin-bottom:20px;
}

.info{
    margin-bottom:30px;
    line-height:1.8;
    color:#d1d5db;
}

.box{
    width:150px;
    height:150px;
    background:#38bdf8;
    margin:30px auto;
    border-radius:20px;
    position:relative;
}

.output{
    font-size:24px;
    color:#38bdf8;
    margin-top:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>Keyboard Interaction Challenge</h1>

<div class="info">

<p>
Press keyboard keys to interact with the webpage.
Use Arrow Keys to move the box.
</p>

</div>

<div class="box" id="box"></div>

<div class="output" id="output">
Press Any Key
</div>

</div>

<script>

let box =
document.getElementById("box");

let x = 0;
let y = 0;

document.addEventListener("keydown", function(event){

document.getElementById("output").innerHTML =
`You Pressed: ${event.key}`;

if(event.key === "ArrowRight"){

x += 20;

}

if(event.key === "ArrowLeft"){

x -= 20;

}

if(event.key === "ArrowDown"){

y += 20;

}

if(event.key === "ArrowUp"){

y -= 20;

}

box.style.transform =
`translate(${x}px,${y}px)`;

});

</script>

</body>
</html>
