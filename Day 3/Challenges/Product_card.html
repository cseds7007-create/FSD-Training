<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Styled Product Card</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .card{
            width:350px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .content{
            padding:25px;
        }

        .content h2{
            color:#111827;
            margin-bottom:10px;
        }

        .content p{
            color:#666;
            line-height:1.7;
            margin-bottom:20px;
        }

        .price{
            font-size:28px;
            color:#2563eb;
            font-weight:bold;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>
<body>

    <div class="card">

        <img src="https://picsum.photos/400/300" alt="product">

        <div class="content">

            <h2>Wireless Headphones</h2>

            <p>
                High quality wireless headphones
                with premium sound and long battery life.
            </p>

            <div class="price">
                ₹2,999
            </div>

            <button>
                Add to Cart
            </button>

        </div>

    </div>

</body>
</html>
