<!--child selector-->


<!DOCTYPE html>
<html>
<head>
<style>
div > p{
    color: blue;
}
</style>
</head>
<body>

<div>
    <p>Direct Child</p>

    <section>
        <p>Nested Paragraph</p>
    </section>
</div>

</body>
</html>
