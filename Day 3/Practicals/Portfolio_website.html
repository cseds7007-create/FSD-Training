<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portfolio Website</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fb;
            color:#333;
        }

        nav{
            background:#111827;
            padding:20px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h1{
            color:white;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:25px;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
            font-size:18px;
            transition:0.3s;
        }

        nav ul li a:hover{
            color:#38bdf8;
        }

        .hero{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:80px 10%;
            min-height:90vh;
        }

        .hero-text{
            max-width:600px;
        }

        .hero-text h2{
            font-size:55px;
            margin-bottom:20px;
            color:#111827;
        }

        .hero-text span{
            color:#2563eb;
        }

        .hero-text p{
            font-size:20px;
            line-height:1.8;
            color:#555;
        }

        .hero-text button{
            margin-top:30px;
            padding:15px 30px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        .hero-text button:hover{
            background:#1d4ed8;
        }

        .hero-image img{
            width:350px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

    </style>

</head>
<body>

    <nav>

        <h1>My Portfolio</h1>

        <ul>

            <li><a href="#">Home</a></li>

            <li><a href="#">About</a></li>

            <li><a href="#">Projects</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    </nav>

    <section class="hero">

        <div class="hero-text">

            <h2>
                Hi, I'm <span>John Doe</span>
            </h2>

            <p>
                I am a Web Development Student learning
                HTML, CSS and JavaScript to build
                beautiful and responsive websites.
            </p>

            <button>
                View Projects
            </button>

        </div>

        <div class="hero-image">

            <img src="https://picsum.photos/400/500" alt="profile">

        </div>

    </section>

</body>
</html>
